# openspec/config.yaml
# Auto-generated by sdd-init — do not edit manually unless you know what you're doing.
schema: spec-driven

context: |
  Tech stack: PHP 8.2+, Laravel 12, Livewire 4, Alpine.js 3, Tailwind CSS 3/4 (via Vite), Vite 7
  Architecture: Domain-driven (app/Domain/), controllers (app/Http/), Livewire components (app/Livewire/)
  Testing: PHPUnit 11.5 — Unit + Feature suites, SQLite in-memory for tests
  Style: EditorConfig (4 spaces, LF), Laravel Pint for formatting, PSR-4 autoloading
  Documentation: Spanish docs in docs/pos/ (vision, functional, technical design, conventions)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Default to Escribir en Español para propuestas de dominio
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "cd backend && composer test"
  verify:
    test_command: "cd backend && composer test"
    build_command: "cd backend && composer install --no-dev --optimize-autoloader"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
