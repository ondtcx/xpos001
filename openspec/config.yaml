# openspec/config.yaml
# Auto-generated by sdd-init — do not edit manually unless you know what you're doing.
schema: spec-driven
strict_tdd: true

context: |
  Tech stack: PHP 8.2+, Laravel 12, Livewire 4 (instalado, no usado aún), Alpine.js 3, Tailwind 3 + 4 (Vite), Vite 7, Breeze
  Architecture: MVC + Service Layer (no DDD). Controllers en app/Http/Controllers, Service layer en app/Support/{Sales,Purchases,Reports}, Form Requests en app/Http/Requests, modelos Eloquent en app/Models
  Testing: PHPUnit 11.5.50 — Unit + Feature suites, SQLite in-memory para tests
  Style: EditorConfig (4 spaces, LF), Laravel Pint para formato, PSR-4 autoloading
  Documentation: docs/pos/ en Español (19 documentos: visión + diseño funcional + técnico + convenciones + estado)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Default to Escribir en Español para propuestas de dominio
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (MVC + app/Support service layer; no Domain folder)
    - Reuse CreateSaleService and other Support services; do not duplicate business logic in controllers
    tdd: true
    test_command: "cd backend && composer test"
  verify:
    test_command: "cd backend && composer test"
    build_command: "cd backend && composer install --no-dev --optimize-autoloader"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  runner:
    command: "cd backend && composer test"
    framework: "PHPUnit 11.5.50"
    bootstrap: "backend/vendor/autoload.php"
  layers:
    unit:
      available: true
      tool: "PHPUnit --testsuite Unit (backend/tests/Unit)"
    integration:
      available: true
      tool: "PHPUnit --testsuite Feature (backend/tests/Feature) — uses HTTP kernel, SQLite in-memory"
    e2e:
      available: false
      tool: "— (no Dusk/Playwright/Cypress detected)"
  coverage:
    available: false
    command: "— (no coverage driver configured in phpunit.xml)"
  quality:
    linter:
      available: true
      command: "cd backend && ./vendor/bin/pint"
    type_checker:
      available: false
      command: "— (no PHPStan/Psalm detected — PHP is untyped at runtime)"
    formatter:
      available: true
      command: "cd backend && ./vendor/bin/pint"
  phpunit:
    config: "backend/phpunit.xml"
    sqlite_in_memory: true
    suites:
      - "Unit (tests/Unit)"
      - "Feature (tests/Feature)"
    test_count_observed:
      unit: 2
      feature: 31
